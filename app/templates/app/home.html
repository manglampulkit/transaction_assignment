<!DOCTYPE html>
<html>
<head>
    <title>Create Transaction</title>
</head>
<body>

<h1>Create Transaction</h1>

<form method="POST">
    {% csrf_token %}

    <input
        type="text"
        name="transaction_id"
        placeholder="Transaction ID"
        required
    >

    <br><br>

    <input
        type="text"
        name="user_id"
        placeholder="User ID"
        required
    >

    <br><br>

    <input
        type="number"
        name="amount"
        placeholder="Amount"
        required
    >

    <br><br>

    <button type="submit">
        Submit
    </button>
</form>

{% if message %}
<p>{{ message }}</p>
{% endif %}

<br>

<a href="/summary-page/">
    User Summary
</a>

<br><br>

<a href="/ranking-page/">
    Rankings
</a>

</body>
</html>
